# Bonus: automates the exact manual steps from docs/03-push-dockerhub.md.
# Each step below maps 1:1 to a command you already ran by hand:
#   docker login        -> "Log in to Docker Hub" step
#   docker build -t ...  -> "Build and push" step (build-push-action)
#   docker push ...       -> same step, push: true
name: Build and push images

on:
  push:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: iris-service, path: models/iris-service }
          - { name: diabetes-service, path: models/diabetes-service }
          - { name: spam-service, path: models/spam-service }
          - { name: gateway, path: gateway }
          - { name: frontend, path: frontend }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:v1
