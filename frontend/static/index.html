<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ML Docker Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    select, button { font-size: 1rem; padding: 8px; margin-top: 4px; width: 100%; box-sizing: border-box; }
    button { margin-top: 12px; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    #video, #snapshot { width: 100%; margin-top: 12px; border: 1px solid #ccc; border-radius: 6px; background: #000; }
    #snapshot { display: none; }
    #result { margin-top: 20px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; white-space: pre-wrap; font-family: monospace; }
    .hint { color: #666; font-size: 0.85rem; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>ML Docker Deployment Demo</h1>
  <p>Pick a model, start your camera, capture a frame. Each model runs in its own container behind the gateway.</p>

  <label for="model">Model</label>
  <select id="model">
    <option value="smile">Smile detector</option>
    <option value="glasses">Glasses detector</option>
    <option value="eyes">Eyes open/closed detector</option>
  </select>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="snapshot" alt="captured frame" />

  <button id="start">Start camera</button>
  <button id="capture" disabled>Capture &amp; Predict</button>
  <div class="hint">Nothing leaves your machine except the single frame you capture — no continuous streaming to the server.</div>

  <div id="result" hidden></div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const snapshot = document.getElementById("snapshot");
    const startBtn = document.getElementById("start");
    const captureBtn = document.getElementById("capture");
    const modelSelect = document.getElementById("model");
    const resultDiv = document.getElementById("result");

    let stream = null;

    startBtn.addEventListener("click", async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        captureBtn.disabled = false;
        startBtn.textContent = "Camera running";
        startBtn.disabled = true;
      } catch (err) {
        resultDiv.hidden = false;
        resultDiv.textContent = "Could not access camera: " + err;
      }
    });

    captureBtn.addEventListener("click", async () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);

      snapshot.src = canvas.toDataURL("image/jpeg");
      snapshot.style.display = "block";
      video.style.display = "none";

      const model = modelSelect.value;
      resultDiv.hidden = false;
      resultDiv.textContent = "Calling " + model + "-service via gateway...";

      canvas.toBlob(async (blob) => {
        const formData = new FormData();
        formData.append("image", blob, "capture.jpg");

        try {
          const res = await fetch(`/api/predict/${model}`, {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          resultDiv.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          resultDiv.textContent = "Error: " + err;
        }
      }, "image/jpeg", 0.9);
    });

    // Switching models doesn't need a new capture — just re-show live video
    // so the user can frame a fresh shot for the newly selected model.
    modelSelect.addEventListener("change", () => {
      snapshot.style.display = "none";
      video.style.display = stream ? "block" : "none";
    });
  </script>
</body>
</html>
