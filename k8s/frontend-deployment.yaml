apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ml-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Replace with the image you pushed: docker push <username>/frontend:v1
          image: REPLACE_WITH_YOUR_DOCKERHUB_USERNAME/frontend:v1
          ports:
            - containerPort: 5000
          env:
            - name: GATEWAY_URL
              value: "http://gateway:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ml-demo
spec:
  selector:
    app: frontend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
  type: NodePort
