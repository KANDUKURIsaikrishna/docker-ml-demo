apiVersion: apps/v1
kind: Deployment
metadata:
  name: eyes-service
  namespace: ml-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eyes-service
  template:
    metadata:
      labels:
        app: eyes-service
    spec:
      containers:
        - name: eyes-service
          # Replace with the image you pushed: docker push <username>/eyes-service:v1
          image: REPLACE_WITH_YOUR_DOCKERHUB_USERNAME/eyes-service:v1
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: eyes-service
  namespace: ml-demo
spec:
  selector:
    app: eyes-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
